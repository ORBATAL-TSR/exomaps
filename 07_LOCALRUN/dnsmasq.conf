# ─────────────────────────────────────────────────────────────────────────────
# dnsmasq stub config — makes exomaps.local resolve to this machine on the LAN
#
# INSTALL (one-time, server machine):
#   sudo apt install dnsmasq           # or: brew install dnsmasq on mac
#   sudo cp dnsmasq.conf /etc/dnsmasq.d/exomaps.conf
#   sudo systemctl restart dnsmasq
#
# CLIENTS (each LAN machine):
#   Option A — /etc/hosts entry (simplest, no DNS server needed):
#     echo "192.168.1.77  exomaps.local" | sudo tee -a /etc/hosts
#
#   Option B — point client DNS to this machine:
#     Set DNS server in network settings to 192.168.1.77
#     dnsmasq will answer exomaps.local and forward everything else upstream
#
# Without this, use the bare IP: https://192.168.1.77 (cert covers both)
# ─────────────────────────────────────────────────────────────────────────────

# Resolve exomaps.local to this machine
address=/exomaps.local/192.168.1.77

# Forward all other DNS upstream (don't break normal internet)
server=8.8.8.8
server=1.1.1.1

# Listen on LAN interface as well as loopback
listen-address=127.0.0.1,192.168.1.77

# Don't read /etc/resolv.conf — we set upstream manually above
no-resolv

# Cache 1000 entries
cache-size=1000
